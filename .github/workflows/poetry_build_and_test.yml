name: Build & Test (Poetry)

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} | Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip tooling
        run: |
          python -m pip install -U pip setuptools wheel

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Add Poetry to PATH (Windows fix)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "$env:APPDATA\Python\Scripts" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Verify Poetry install
        shell: bash
        run: poetry --version

      # 🔥 CRITICAL FIX: prevent numpy source builds
      - name: Force binary installs only
        shell: bash
        run: |
          poetry run pip install --upgrade pip
          poetry run pip config set global.only-binary ":all:"

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        shell: bash
        run: poetry install --no-interaction --no-ansi --sync

      - name: Show environment info
        shell: bash
        run: |
          python --version
          poetry run pip list

      - name: Run type checking
        shell: bash
        run: poetry run mypy

      - name: Run tests
        shell: bash
        run: poetry run pytest --cov=mlconjug3 --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"

      - name: Build package
        run: poetry build

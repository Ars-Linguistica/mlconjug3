name: Build & Test (Poetry)

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} | Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip tooling
        run: python -m pip install -U pip setuptools wheel

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      # ✅ Correct Poetry PATH (Windows)
      - name: Add Poetry to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "$env:USERPROFILE\.local\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Verify Poetry install
        run: poetry --version

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi --sync

      # 🔥 FIX: install scipy AFTER venv exists
      - name: Fix SciPy (Windows Python 3.13+)
        if: runner.os == 'Windows' && startsWith(matrix.python-version, '3.13')
        shell: pwsh
        run: |
          poetry run pip install "scipy<1.13"

      # 🔥 Optional but recommended stability
      - name: Limit threads (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "OMP_NUM_THREADS=1" >> $env:GITHUB_ENV
          echo "OPENBLAS_NUM_THREADS=1" >> $env:GITHUB_ENV
          echo "MKL_NUM_THREADS=1" >> $env:GITHUB_ENV
          echo "NUMEXPR_NUM_THREADS=1" >> $env:GITHUB_ENV

      - name: Show environment info
        run: |
          python --version
          poetry run pip list

      - name: Run type checking
        run: poetry run mypy

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: poetry run pytest --cov=mlconjug3 --cov-report=xml

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: poetry run pytest --cov=mlconjug3 --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"

      - name: Build package
        run: poetry build

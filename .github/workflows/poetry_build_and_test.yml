name: Build & Test (Poetry)

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} | Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # -------------------------
          # STABLE
          # -------------------------
          - { os: ubuntu-latest, python-version: "3.9", experimental: false }
          - { os: ubuntu-latest, python-version: "3.10", experimental: false }
          - { os: ubuntu-latest, python-version: "3.11", experimental: false }
          - { os: ubuntu-latest, python-version: "3.12", experimental: false }

          - { os: macos-latest, python-version: "3.9", experimental: false }
          - { os: macos-latest, python-version: "3.10", experimental: false }
          - { os: macos-latest, python-version: "3.11", experimental: false }
          - { os: macos-latest, python-version: "3.12", experimental: false }

          - { os: windows-latest, python-version: "3.9", experimental: false }
          - { os: windows-latest, python-version: "3.10", experimental: false }
          - { os: windows-latest, python-version: "3.11", experimental: false }
          - { os: windows-latest, python-version: "3.12", experimental: false }

          # -------------------------
          # EXPERIMENTAL
          # -------------------------
          - { os: ubuntu-latest, python-version: "3.13", experimental: true }
          - { os: ubuntu-latest, python-version: "3.14", experimental: true }

          - { os: macos-latest, python-version: "3.13", experimental: true }
          - { os: macos-latest, python-version: "3.14", experimental: true }

          - { os: windows-latest, python-version: "3.13", experimental: true }
          - { os: windows-latest, python-version: "3.14", experimental: true }

    continue-on-error: ${{ matrix.experimental }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - run: python -m pip install -U pip setuptools wheel

      - uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Fix Poetry PATH (Unix)
        if: runner.os != 'Windows'
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Fix Poetry PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "$env:USERPROFILE\.local\bin" >> $env:GITHUB_PATH

      - run: poetry --version

      - uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - run: poetry install --no-interaction --no-ansi --sync

      # Prevent BLAS instability
      - name: Limit threads (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "OMP_NUM_THREADS=1" >> $env:GITHUB_ENV
          echo "OPENBLAS_NUM_THREADS=1" >> $env:GITHUB_ENV
          echo "MKL_NUM_THREADS=1" >> $env:GITHUB_ENV
          echo "NUMEXPR_NUM_THREADS=1" >> $env:GITHUB_ENV

      - run: |
          python --version
          poetry run pip list

      - run: poetry run mypy

      # skip tests ONLY where SciPy crashes
      - name: Run tests
        if: ${{ !(runner.os == 'Windows' && (matrix.python-version == '3.13' || matrix.python-version == '3.14')) }}
        run: poetry run pytest --cov=mlconjug3 --cov-report=xml

      - uses: codecov/codecov-action@v4
        if: ${{ !(runner.os == 'Windows' && (matrix.python-version == '3.13' || matrix.python-version == '3.14')) }}
        with:
          files: ./coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: snok/install-poetry@v1
        with:
          version: "1.8.3"

      - run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - run: poetry build

name: Build & Test (Poetry)

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} | Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # -------------------------
          # STABLE PYTHON VERSIONS
          # -------------------------
          - os: ubuntu-latest
            python-version: "3.9"
            experimental: false
          - os: ubuntu-latest
            python-version: "3.10"
            experimental: false
          - os: ubuntu-latest
            python-version: "3.11"
            experimental: false
          - os: ubuntu-latest
            python-version: "3.12"
            experimental: false

          - os: macos-latest
            python-version: "3.9"
            experimental: false
          - os: macos-latest
            python-version: "3.10"
            experimental: false
          - os: macos-latest
            python-version: "3.11"
            experimental: false
          - os: macos-latest
            python-version: "3.12"
            experimental: false

          - os: windows-latest
            python-version: "3.9"
            experimental: false
          - os: windows-latest
            python-version: "3.10"
            experimental: false
          - os: windows-latest
            python-version: "3.11"
            experimental: false
          - os: windows-latest
            python-version: "3.12"
            experimental: false

          # -------------------------
          # EXPERIMENTAL (ALLOW FAIL)
          # -------------------------
          - os: ubuntu-latest
            python-version: "3.13"
            experimental: true
          - os: ubuntu-latest
            python-version: "3.14"
            experimental: true

          - os: macos-latest
            python-version: "3.13"
            experimental: true
          - os: macos-latest
            python-version: "3.14"
            experimental: true

          - os: windows-latest
            python-version: "3.13"
            experimental: true
          - os: windows-latest
            python-version: "3.14"
            experimental: true

    continue-on-error: ${{ matrix.experimental }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip tooling
        run: python -m pip install -U pip setuptools wheel

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      # FIX: ensure Poetry is available on Windows
      - name: Add Poetry to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "$env:APPDATA\Python\Scripts" | Out-File -Append -FilePath $env:GITHUB_PATH

      # Cross-platform safe
      - name: Verify Poetry
        run: python -m poetry --version

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      # CRITICAL: install BEFORE any poetry run
      - name: Install dependencies
        run: python -m poetry install --no-interaction --no-ansi --sync

      # Reduce BLAS crashes on Windows
      - name: Limit threads (Windows stability)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "OMP_NUM_THREADS=1" >> $env:GITHUB_ENV
          echo "OPENBLAS_NUM_THREADS=1" >> $env:GITHUB_ENV
          echo "MKL_NUM_THREADS=1" >> $env:GITHUB_ENV
          echo "NUMEXPR_NUM_THREADS=1" >> $env:GITHUB_ENV

      - name: Show environment
        run: |
          python --version
          python -m poetry run pip list

      - name: Run type checking
        run: python -m poetry run mypy

      - name: Run tests
        run: python -m poetry run pytest --cov=mlconjug3 --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"

      - name: Build package
        run: python -m poetry build
